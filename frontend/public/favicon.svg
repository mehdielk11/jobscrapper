<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#grad)"/>
  
  <!-- Briefcase Handle -->
  <path d="M38 40 V 30 C 38 20, 62 20, 62 30 V 40" fill="none" stroke="#e2e8f0" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Briefcase Body -->
  <rect x="22" y="40" width="56" height="40" rx="6" fill="#f8fafc" shadow="0 4 6 rgba(0,0,0,0.1)"/>
  
  <!-- Top Flap detail -->
  <path d="M22 46 Q 50 56 78 46" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  
  <!-- Magnifying Glass (Scraper) -->
  <circle cx="48" cy="60" r="10" fill="none" stroke="#4f46e5" stroke-width="5"/>
  <line x1="55" y1="67" x2="65" y2="77" stroke="#4f46e5" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Radar/Signal ripples to imply scraping -->
  <path d="M 68 50 A 15 15 0 0 1 73 60" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
  <path d="M 74 46 A 22 22 0 0 1 81 62" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>